{% extends "base.html" %}

{% block title %}Восстановление пароля | {{ site_short_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card surface-card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Восстановление пароля</h1>
                <p class="text-secondary">Укажите email учетной записи. Если адрес найден, система отправит ссылку для смены пароля.</p>
                <form method="post" class="vstack gap-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit">Отправить ссылку</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
