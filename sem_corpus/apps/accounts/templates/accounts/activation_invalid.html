{% extends "base.html" %}

{% block title %}Ссылка недействительна | {{ site_short_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card surface-card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Ссылка недействительна</h1>
                <p class="text-secondary">
                    Ссылка подтверждения устарела или уже была использована. Попробуйте войти или обратитесь к администратору корпуса.
                </p>
                <a class="btn btn-primary" href="{% url 'login' %}">Перейти ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
