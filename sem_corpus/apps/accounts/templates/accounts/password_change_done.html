{% extends "base.html" %}

{% block title %}Пароль изменен | {{ site_short_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card surface-card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Пароль изменен</h1>
                <p class="text-secondary">Новый пароль сохранен. Используйте его при следующем входе.</p>
                <a class="btn btn-primary" href="{% url 'accounts:dashboard' %}">Вернуться в личный кабинет</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
