{% extends "base.html" %}

{% block title %}Подтверждение почты | {{ site_short_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card surface-card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Проверьте почту</h1>
                <p class="text-secondary">
                    Мы отправили ссылку подтверждения на указанный адрес. После перехода по ссылке личный кабинет станет доступен.
                </p>
                <a class="btn btn-outline-primary" href="{% url 'login' %}">Перейти ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
