{% extends "base.html" %}

{% block title %}Смена пароля | {{ site_short_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card surface-card shadow-sm border-0">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Смена пароля</h1>
                <p class="text-secondary">Укажите текущий пароль и задайте новый. После сохранения сеанс останется активным.</p>
                <form method="post" class="vstack gap-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-primary" type="submit">Сохранить пароль</button>
                        <a class="btn btn-outline-secondary" href="{% url 'accounts:dashboard' %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
