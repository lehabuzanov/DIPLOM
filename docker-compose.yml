services:
  db:
    image: postgres:16
    container_name: sem_corpus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sem_corpus}
      POSTGRES_USER: ${POSTGRES_USER:-sem_corpus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sem_corpus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    image: sem_corpus_web:local
    container_name: sem_corpus_web
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py purge_demo_content &&
             python manage.py prepare_access_control --assign-missing-researcher &&
             python manage.py refresh_author_geography &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - ./:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:
